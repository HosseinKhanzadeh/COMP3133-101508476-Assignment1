@if (open()) {
  <div
    class="ems-modal-backdrop"
    role="presentation"
    (click)="onBackdropClick($event)"
  >
    <div
      class="ems-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="delete-modal-title"
      (click)="$event.stopPropagation()"
    >
      <h2 class="ems-modal-title" id="delete-modal-title">
        <svg
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
          <line x1="12" y1="9" x2="12" y2="13" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
        Confirm Delete
      </h2>
      <p class="ems-modal-body">
        Are you sure you want to delete
        <strong class="ems-modal-name">{{ employeeName() }}</strong
        >? This action cannot be undone.
      </p>
      <div class="ems-modal-actions">
        <button type="button" class="ems-btn-secondary" (click)="onCancel()">
          Cancel
        </button>
        <button type="button" class="ems-btn-danger" (click)="onConfirm()">
          Confirm Delete
        </button>
      </div>
    </div>
  </div>
}
