<header class="ems-navbar">
  <a routerLink="/employees" class="ems-navbar-brand">
    <svg
      width="22"
      height="22"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      aria-hidden="true"
    >
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
      <circle cx="9" cy="7" r="4" />
      <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
      <path d="M16 3.13a4 4 0 0 1 0 7.75" />
    </svg>
    <span class="ems-navbar-brand-text-long">Employee Manager</span>
    <span class="ems-navbar-brand-text-short">EMS</span>
  </a>
  <nav class="ems-navbar-nav" aria-label="Main">
    <a
      routerLink="/employees"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="ems-nav-link"
    >
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        aria-hidden="true"
      >
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
        <circle cx="9" cy="7" r="4" />
        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
      </svg>
      <span class="ems-nav-link-label-long">Employees</span>
      <span class="ems-nav-link-label-short">List</span>
    </a>
    <a routerLink="/employees/add" routerLinkActive="active" class="ems-nav-link">
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        aria-hidden="true"
      >
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
      <span class="ems-nav-link-label-long">Add Employee</span>
      <span class="ems-nav-link-label-short">Add</span>
    </a>
    <button type="button" class="ems-nav-logout" (click)="logout()">
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        aria-hidden="true"
      >
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
      Logout
    </button>
  </nav>
</header>
